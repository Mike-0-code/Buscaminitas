<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Buscaminas Moderno</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div class="difficulty-buttons">
                <button data-difficulty="facil" class="active">Normal</button>
                <button data-difficulty="dificil">Difícil</button>
                <button data-difficulty="experto">Experto</button>
            </div>
            <button id="reset-btn" class="reset-btn">🔄</button>
        </div>
        <div class="game-area">
            <canvas id="game-canvas" width="512" height="512"></canvas>
        </div>
        <div id="message" class="message"></div>
    </div>
    <script src="js/levels.js"></script>
    <script src="js/gameState.js"></script>
    <script src="js/board.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/inputHandler.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
